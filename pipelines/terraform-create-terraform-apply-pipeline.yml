trigger:
  - main

resources:
  repositories:
    - repository: templates
      type: github
      name: bigcat3997/one-press-ado-templates
      endpoint: github.com_BigCat3997
      ref: refs/heads/tidy
    - repository: terraform-ado
      type: github
      name: bigcat3997/pinwheel-ado
      endpoint: github.com_BigCat3997
      ref: refs/heads/main

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - stg
      - prd

extends:
  template: templates/workflow-terraform-apply3.yml@templates
  parameters:
    runningAgent: ubuntu-latest
    dependencies:
      - checkout: self
      - checkout: terraform-ado
    tfWorkDir: pinwheel-ado/modules/impl/pipeline
    tfVarsFile: environments/${{ parameters.environment }}.tfvars
    backendAWSBucket: $(backendAWSBucket)
    backendAWSKey: pipeline/${{ parameters.environment }}/terraform.tfstate
    backendAWSDynamoDBTable: $(backendAWSDynamoDBTable)
    backendAWSRegion: $(AWS_REGION)
    awsAccessKeyId: $(AWS_ACCESS_KEY_ID)
    awsSecretAccessKey: $(AWS_SECRET_ACCESS_KEY)
    awsRegion: $(AWS_REGION)
